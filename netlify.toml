[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# ── Redirects ─────────────────────────────────────────────────────────────────

# Redirect old /kitchenware URL to current category
[[redirects]]
  from = "/kitchenware"
  to = "/wooden-kitchenware"
  status = 301
  force = true

# Trailing-slash canonicalisation (real users + bots)
# bot-prerender.ts handles bots, these handle real users + Googlebot edge cases
[[redirects]]
  from = "/about/"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/contact/"
  to = "/contact"
  status = 301
  force = true

[[redirects]]

# Redirect old Squarespace product URLs (404s) to relevant categories
[[redirects]]
  from = "/products/kauri-bowl"
  to = "/wooden-kitchenware"
  status = 301
  force = true

[[redirects]]
  from = "/products/sedan"
  to = "/wooden-cars"
  status = 301
  force = true

[[redirects]]
  from = "/products/baby-blocks-native-rimu-8-pack"
  to = "/wooden-baby-toys"
  status = 301
  force = true

[[redirects]]
  from = "/products/school-bus-small"
  to = "/wooden-trucks"
  status = 301
  force = true

# Redirect old Squarespace SQ product IDs (redirect errors) to main shop
[[redirects]]
  from = "/products/SQ3632557"
  to = "/wooden-toys-nz"
  status = 301
  force = true

[[redirects]]
  from = "/products/SQ1562009"
  to = "/wooden-toys-nz"
  status = 301
  force = true

[[redirects]]
  from = "/products/SQ1772907"
  to = "/wooden-toys-nz"
  status = 301
  force = true

[[redirects]]
  from = "/products/SQ2367809"
  to = "/wooden-toys-nz"
  status = 301
  force = true

# Block search URL templates from indexing
[[redirects]]
  from = "/search"
  to = "/"
  status = 301
  force = true

# SPA routing - all paths serve index.html (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Cache headers ─────────────────────────────────────────────────────────────

# Cache static assets aggressively (JS/CSS with hashed filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 1 year
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts for 1 year
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Security + performance headers ───────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Redirects ─────────────────────────────────────────────────────────────────

# Static files served directly (must come before SPA catch-all)
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

# /wooden-planes → correct category URL
[[redirects]]
  from = "/wooden-planes"
  to = "/wooden-planes-helicopters"
  status = 301
  force = true


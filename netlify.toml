  to = "/reviews"
  status = 301
  force = true

[[redirects]]
  from = "/shipping/"
  to = "/shipping"
  status = 301
  force = true

[[redirects]]
  from = "/returns/"
  to = "/returns"
  status = 301
  force = true

[[redirects]]
  from = "/privacy/"
  to = "/privacy"

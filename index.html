<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Base title - React Helmet will override this per page -->
    <title>Poppa's Wooden Creations - Handcrafted Wooden Toys Made in New Zealand</title>

    <!-- NOTE: No base meta description here — React Helmet manages this per-page -->
    <!-- Having both causes "duplicate meta description" errors in Bing/SEO tools -->

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://hfirnolwhesjkxshidxo.supabase.co" crossorigin="anonymous" />
    <!-- Defer GTM connection until after load -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.gstatic.com" />

    <!-- Google Customer Reviews Badge Script - defer until after load -->
    <script id='merchantWidgetScript' src="https://www.gstatic.com/shopping/merchant/merchantwidget.js" defer></script>
    
    <!-- Base Open Graph - React Helmet will override on specific pages -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Poppa's Wooden Creations - Handcrafted Wooden Toys NZ" />
    <meta property="og:description" content="Premium handcrafted wooden toys made from native New Zealand timber. Trusted by Montessori schools." />
    <meta property="og:image" content="https://poppaswoodencreations.co.nz/og-image.jpg" />
    <meta property="og:url" content="https://poppaswoodencreations.co.nz" />
    <meta property="og:site_name" content="Poppa's Wooden Creations" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Poppa's Wooden Creations - Handcrafted Wooden Toys NZ" />
    <meta name="twitter:description" content="Premium handcrafted wooden toys made from native New Zealand timber" />
    <meta name="twitter:image" content="https://poppaswoodencreations.co.nz/og-image.jpg" />
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Google Customer Reviews Badge Initialization -->
    <script>
      window.addEventListener('load', function() {
        if (typeof merchantWidgetScript !== 'undefined') {
          merchantWidgetScript.addEventListener('load', function () {
            merchantwidget.start({
              merchant_id: 5825166305,
              position: 'BOTTOM_RIGHT',
              region: 'AU'
            });
          });
        }
      });
    </script>
    
    <!-- Load Google Tag Manager on first interaction, with a 10s fallback for non-interacting visits -->
    <script>
      (function () {
        var gtmLoaded = false;
        var interactionEvents = ['scroll', 'keydown', 'mousemove', 'touchstart', 'click'];

        function loadGTM() {
          if (gtmLoaded) return;
          gtmLoaded = true;

          interactionEvents.forEach(function (evt) {
            window.removeEventListener(evt, loadGTM);
          });

          (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
          new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
          'https://www.googletagmanager.com/gtag/js?id='+i+dl;f.parentNode.insertBefore(j,f);
          })(window,document,'script','dataLayer','G-VM9XERD2RB');

          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-VM9XERD2RB');
        }

        window.addEventListener('load', function () {
          interactionEvents.forEach(function (evt) {
            window.addEventListener(evt, loadGTM, { once: true, passive: true });
          });
          setTimeout(loadGTM, 10000);
        });
      })();
    </script>
  </body>
</html>
